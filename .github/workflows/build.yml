name: Build Armbian for A311D2 AN400

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 2 * * 0'  # 每周日凌晨2点自动构建
  workflow_dispatch:
    inputs:
      release_type:
        description: '系统版本'
        required: true
        default: 'bookworm'
        type: choice
        options:
          - bookworm
          - noble
      desktop:
        description: '是否包含桌面环境'
        required: true
        default: 'no'
        type: choice
        options:
          - no
          - yes

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  issues: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout 自定义配置
        uses: actions/checkout@v4
        with:
          path: custom-config

      - name: Checkout Armbian 构建系统
        uses: actions/checkout@v4
        with:
          repository: armbian/build
          path: build
          ref: main

      - name: 安装构建依赖 + QEMU + 修复 binfmt
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            bc bison build-essential ca-certificates ccache cpio curl \
            device-tree-compiler dialog dirmngr dosfstools fakeroot \
            flex gawk git gnupg gperf libelf-dev liblz4-tool \
            libncurses5-dev libsdl2-dev libssl-dev lsb-release \
            lzop mtools ninja-build parted pkg-config \
            python3 python3-pip rsync sudo swig u-boot-tools \
            udev unzip wget xz-utils zip zlib1g-dev \
            qemu-user-static
          
          # 用内核 binfmt_misc 注册 QEMU (绕过 systemd-binfmt)
          sudo modprobe binfmt_misc 2>/dev/null || true
          sudo mount -t binfmt_misc none /proc/sys/fs/binfmt_misc 2>/dev/null || true
          
          # aarch64
          if [ ! -f /proc/sys/fs/binfmt_misc/qemu-aarch64 ]; then
            echo ':qemu-aarch64:M::\x7fELF\x02\x01\x01\x00\x00\x00\x00\x00\x00\x00\x00\x00\x02\x00\xb7\x00:\xff\xff\xff\xff\xff\xff\xff\x00\xff\xff\xff\xff\xff\xff\xff\xff\xfe\xff\xff\xff:/usr/bin/qemu-aarch64-static:OCF' | sudo tee /proc/sys/fs/binfmt_misc/register > /dev/null
          fi
          # arm
          if [ ! -f /proc/sys/fs/binfmt_misc/qemu-arm ]; then
            echo ':qemu-arm:M::\x7fELF\x01\x01\x01\x00\x00\x00\x00\x00\x00\x00\x00\x00\x02\x00\x28\x00:\xff\xff\xff\xff\xff\xff\xff\x00\xff\xff\xff\xff\xff\xff\xff\xff\xfe\xff\xff\xff:/usr/bin/qemu-arm-static:OCF' | sudo tee /proc/sys/fs/binfmt_misc/register > /dev/null
          fi
          
          # 包装 update-binfmts (systemd-binfmt 在 GH Actions 上不可用)
          if [ -f /usr/sbin/update-binfmts ] && [ ! -f /usr/sbin/update-binfmts.real ]; then
            sudo mv /usr/sbin/update-binfmts /usr/sbin/update-binfmts.real
            printf '#!/bin/bash\nif [ "$1" = "--enable" ] || [ "$1" = "--disable" ]; then\n  echo "update-binfmts: binfmt registered via kernel" >&2\n  exit 0\nfi\nexec /usr/sbin/update-binfmts.real "$@"\n' | sudo tee /usr/sbin/update-binfmts > /dev/null
            sudo chmod +x /usr/sbin/update-binfmts
          fi
          
          echo "=== QEMU test ==="
          /usr/bin/qemu-aarch64-static --version 2>&1 | head -1 || echo "QEMU aarch64 OK"
          echo "=== binfmt_misc ==="
          ls /proc/sys/fs/binfmt_misc/qemu* 2>/dev/null || echo "(kernel binfmt)"
          echo "Binfmt wrapper:"
          file /usr/sbin/update-binfmts

      - name: 复制自定义板级配置
        run: |
          cp -v custom-config/config/boards/an400.conf build/config/boards/

      - name: 扩展磁盘空间
        run: |
          sudo apt-get install -y lvm2
          sudo pvcreate /dev/sdb || true
          sudo vgextend ubuntu-vg /dev/sdb || true
          sudo lvextend -L 50G -r /dev/mapper/ubuntu--vg-ubuntu--lv || true
          df -h /

      - name: 构建 Armbian
        run: |
          cd build
          ./compile.sh \
            BOARD=an400 \
            BRANCH=legacy \
            RELEASE="${{ inputs.release_type || 'bookworm' }}" \
            BUILD_DESKTOP="${{ inputs.desktop || 'no' }}" \
            BUILD_MINIMAL=yes \
            KERNEL_CONFIGURE=no \
            KERNEL_KEEP_CONFIG=no \
            2>&1 | tee /tmp/armbian-build.log

      - name: 构建失败 - 输出调试信息
        if: failure()
        run: |
          echo "=== 构建失败调试信息 ==="
          echo "--- 板级配置 ---"
          cat build/config/boards/an400.conf 2>/dev/null || echo "an400.conf not found"
          echo "--- Family 配置 ---"
          cat build/config/sources/families/meson-s4t7.conf 2>/dev/null | head -50 || echo "meson-s4t7.conf not found"
          echo "--- U-Boot 源码 ---"
          ls -la build/cache/sources/u-boot/ 2>/dev/null || echo "u-boot cache not found"
          find build/cache/sources/u-boot -name "*.log" 2>/dev/null | head -5
          echo "--- U-Boot defconfig ---"
          find build/cache/sources/u-boot -name "t7_an400*" -o -name "kvim4*" 2>/dev/null | head -20
          find build/cache/sources/u-boot -path "*/configs/*defconfig" 2>/dev/null | grep -i "t7\|kvim\|an400\|tvpro\|65t33z" | head -20
          find build/cache/sources/u-boot -path "*/board/amlogic/*" -maxdepth 5 2>/dev/null | grep -i "t7\|kvim\|an400\|tvpro\|65t33z" | head -20
          echo "--- FIP 目录 ---"
          find build/cache/sources/u-boot -name "fip" -type d 2>/dev/null | head -5
          find build/cache/sources/u-boot -path "*/fip/mk*" 2>/dev/null | head -10
          find build/cache/sources/u-boot -path "*/fip/variables*" 2>/dev/null | head -5
          echo "--- 内核源码 ---"
          ls -la build/cache/sources/kernel/ 2>/dev/null || echo "kernel cache not found"
          echo "--- 构建日志（错误行）---"
          grep -i "error\|failed\|fatal\|cannot\|not found\|no such\|no rule\|defconfig\|make:" /tmp/armbian-build.log 2>/dev/null | tail -80 || echo "No build log found"
          echo "--- 构建日志最后 200 行 ---"
          tail -200 /tmp/armbian-build.log 2>/dev/null || echo "No build log found"
          echo "--- Armbian 日志文件 ---"
          find build/output/logs -name "*.log" 2>/dev/null | head -5 | while read f; do
            echo "=== $f ==="
            tail -100 "$f" 2>/dev/null
          done

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: armbian-an400-${{ inputs.release_type || 'bookworm' }}-${{ github.run_id }}
          path: |
            build/output/images/*.img
            build/output/images/*.sha
            build/output/images/*.txt
          retention-days: 30
          compression-level: 0

      - name: 构建失败 - 创建 Issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const body = `## 构建失败 🚨\n\n- **运行**: [${process.env.GITHUB_RUN_ID}](${runUrl})\n- **触发**: ${context.eventName}\n- **提交**: ${context.sha}\n\n请检查日志修复后重新推送。`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['build-failure'],
              state: 'open'
            });
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '构建失败 - 需要修复',
                body: body,
                labels: ['build-failure']
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: body
              });
            }