name: Build Armbian for A311D2 AN400

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      release:
        description: 'Release version'
        required: true
        default: 'bookworm'
        type: choice
        options:
          - bookworm
          - noble
      desktop:
        description: 'Build desktop'
        required: true
        default: 'no'
        type: choice
        options:
          - 'yes'
          - 'no'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  issues: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 600

    steps:
      - name: Checkout custom config
        uses: actions/checkout@v4
        with:
          path: custom-config
          fetch-depth: 1

      - name: Checkout Armbian build system
        uses: actions/checkout@v4
        with:
          repository: armbian/build
          path: build
          ref: main
          fetch-depth: 1

      - name: Install dependencies and setup QEMU/binfmt
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            bc bison build-essential ca-certificates ccache cpio curl \
            device-tree-compiler dialog dirmngr dosfstools fakeroot \
            flex gawk git gnupg gperf libelf-dev liblz4-tool \
            libncurses5-dev libsdl2-dev libssl-dev lsb-release \
            lzop mtools ninja-build parted pkg-config \
            python3 python3-pip rsync sudo swig u-boot-tools \
            udev unzip wget xz-utils zip zlib1g-dev \
            qemu-user-static xxd binfmt-support

          sudo modprobe binfmt_misc 2>/dev/null || true
          sudo mount -t binfmt_misc none /proc/sys/fs/binfmt_misc 2>/dev/null || true

          for arch in aarch64 arm riscv64; do
            if [ ! -f "/proc/sys/fs/binfmt_misc/qemu-${arch}" ] && [ -f "/usr/bin/qemu-${arch}-static" ]; then
              case "${arch}" in
                aarch64) magic='\x7fELF\x02\x01\x01\x00\x00\x00\x00\x00\x00\x00\x00\x00\x02\x00\xb7\x00' ;;
                arm)     magic='\x7fELF\x01\x01\x01\x00\x00\x00\x00\x00\x00\x00\x00\x00\x02\x00\x28\x00' ;;
                riscv64) magic='\x7fELF\x02\x01\x01\x00\x00\x00\x00\x00\x00\x00\x00\x00\x02\x00\xf3\x00' ;;
              esac
              mask='\xff\xff\xff\xff\xff\xff\xff\x00\xff\xff\xff\xff\xff\xff\xff\xff\xfe\xff\xff\xff'
              echo ":qemu-${arch}:M::${magic}:${mask}:/usr/bin/qemu-${arch}-static:OCF" | sudo tee /proc/sys/fs/binfmt_misc/register > /dev/null 2>&1 || true
            fi
          done

          if [ ! -f /usr/bin/qemu-loongarch64-static ]; then
            sudo ln -sf /bin/true /usr/bin/qemu-loongarch64-static
          fi
          if [ ! -f /proc/sys/fs/binfmt_misc/qemu-loongarch64 ]; then
            echo ':qemu-loongarch64:M::\x7fELF\x02\x01\x01\x00\x00\x00\x00\x00\x00\x00\x00\x00\x02\x00\x02\x01:\xff\xff\xff\xff\xff\xff\xff\x00\xff\xff\xff\xff\xff\xff\xff\xff\xfe\xff\xff\xff:/usr/bin/qemu-loongarch64-static:OCF' | sudo tee /proc/sys/fs/binfmt_misc/register > /dev/null 2>&1 || true
          fi

          sudo mkdir -p /usr/share/binfmts
          for arch in arm aarch64 riscv64 loongarch64; do
            case "${arch}" in
              arm)     magic='\x7f\x45\x4c\x46\x01\x01\x01\x00\x00\x00\x00\x00\x00\x00\x00\x00\x02\x00\x28\x00' ;;
              aarch64) magic='\x7f\x45\x4c\x46\x02\x01\x01\x00\x00\x00\x00\x00\x00\x00\x00\x00\x02\x00\xb7\x00' ;;
              riscv64) magic='\x7f\x45\x4c\x46\x02\x01\x01\x00\x00\x00\x00\x00\x00\x00\x00\x00\x02\x00\xf3\x00' ;;
              loongarch64) magic='\x7f\x45\x4c\x46\x02\x01\x01\x00\x00\x00\x00\x00\x00\x00\x00\x00\x02\x00\x02\x01' ;;
            esac
            mask='\xff\xff\xff\xff\xff\xff\xff\x00\xff\xff\xff\xff\xff\xff\xff\xff\xfe\xff\xff\xff'
            printf 'package qemu-user-static\ninterpreter /usr/bin/qemu-%s-static\nmagic %s\nmask %s\noffset 0\ncredentials yes\nfix_binary no\npreserve yes\n' "${arch}" "${magic}" "${mask}" | sudo tee "/usr/share/binfmts/qemu-${arch}" > /dev/null
          done

          sudo dpkg-divert --local --divert /usr/sbin/update-binfmts.real --rename /usr/sbin/update-binfmts 2>/dev/null || true
          printf '#!/bin/bash\ncase "$1" in\n  --enable|--disable|--import)\n    exit 0\n    ;;\n  *)\n    if [ -x /usr/sbin/update-binfmts.real ]; then\n      exec /usr/sbin/update-binfmts.real "$@" 2>/dev/null\n    fi\n    exit 0\n    ;;\nesac\n' | sudo tee /usr/sbin/update-binfmts > /dev/null
          sudo chmod +x /usr/sbin/update-binfmts

          echo "=== QEMU binfmt verification ==="
          ls /proc/sys/fs/binfmt_misc/qemu* 2>/dev/null || echo "No kernel binfmt entries"
          /usr/bin/qemu-aarch64-static --version 2>&1 | head -1
          echo "=== update-binfmts wrapper ==="
          cat /usr/sbin/update-binfmts
          echo "=== dpkg-divert status ==="
          dpkg-divert --list /usr/sbin/update-binfmts 2>/dev/null || echo "No divert"

      - name: Copy custom board config and patches
        run: |
          cp -v custom-config/config/boards/an400.conf build/config/boards/
          mkdir -p build/packages/bsp/meson-s4t7/an400/etc/initramfs-tools
          mkdir -p build/packages/bsp/meson-s4t7/an400/etc/modprobe.d
          cp -rv custom-config/config/packages/bsp/meson-s4t7/an400/* build/packages/bsp/meson-s4t7/an400/
          mkdir -p build/patch/u-boot/u-boot-meson-s4t7
          if ls custom-config/patch/u-boot/u-boot-meson-s4t7/*.patch 1>/dev/null 2>&1; then
            cp -v custom-config/patch/u-boot/u-boot-meson-s4t7/*.patch build/patch/u-boot/u-boot-meson-s4t7/
          fi
          echo "=== BSP directory structure ==="
          find build/packages/bsp/meson-s4t7/ -type f
          echo "=== U-Boot patches ==="
          ls -la build/patch/u-boot/u-boot-meson-s4t7/

      - name: Build Armbian
        run: |
          set -o pipefail
          cd build
          RELEASE="${{ github.event.inputs.release || 'bookworm' }}"
          BUILD_DESKTOP="${{ github.event.inputs.desktop || 'no' }}"
          ./compile.sh \
            BOARD=an400 \
            BRANCH=legacy \
            RELEASE=$RELEASE \
            BUILD_DESKTOP=$BUILD_DESKTOP \
            BUILD_MINIMAL=yes \
            KERNEL_CONFIGURE=no \
            DOCKER=no \
            2>&1 | tee /tmp/armbian-build.log

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: armbian-an400-images
          path: |
            build/output/images/*.img
            build/output/images/*.sha
            build/output/images/*.txt
          retention-days: 30
          compression-level: 0
          if-no-files-found: warn

      - name: Debug on failure
        if: failure()
        run: |
          echo "=== Board Config ==="
          cat build/config/boards/an400.conf 2>/dev/null || echo "an400.conf not found"
          echo ""
          echo "=== Family Config ==="
          cat build/config/sources/families/meson-s4t7.conf 2>/dev/null | head -80 || echo "meson-s4t7.conf not found"
          echo ""
          echo "=== BSP Directory ==="
          find build/packages/bsp/meson-s4t7/ -type f 2>/dev/null || echo "BSP directory not found"
          echo ""
          echo "=== U-Boot Patches ==="
          ls -la build/patch/u-boot/u-boot-meson-s4t7/ 2>/dev/null || echo "No U-Boot patches found"
          echo ""
          echo "=== U-Boot Cache ==="
          find build/cache/sources/u-boot/ -name "*.defconfig" 2>/dev/null | head -20 || echo "No defconfig found"
          find build/cache/sources/u-boot/ -name "kvim4*" -o -name "t7_an400*" 2>/dev/null | head -20 || echo "No VIM4/AN400 files found"
          echo ""
          echo "=== update-binfmts status ==="
          cat /usr/sbin/update-binfmts 2>/dev/null | head -5 || echo "update-binfmts not found"
          dpkg-divert --list /usr/sbin/update-binfmts 2>/dev/null || echo "No divert"
          echo ""
          echo "=== Build Log Errors ==="
          grep -i "error\|failed\|fatal\|cannot\|not found\|no such\|no rule\|defconfig\|make:\|BOOTCONFIG\|build_custom_uboot\|EXTENSION_BUILT_UBOOT" /tmp/armbian-build.log 2>/dev/null | tail -100 || echo "No build log found"
          echo ""
          echo "=== Build Log (last 300 lines) ==="
          tail -300 /tmp/armbian-build.log 2>/dev/null || echo "No build log found"

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `Build failed: ${context.sha.substring(0, 7)}`;
            const body = `Build failed on commit ${context.sha}\n\nRun: ${runUrl}\n\nPlease check the logs for details.`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['build-failure'],
              state: 'open'
            });
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['build-failure']
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: body
              });
            }
