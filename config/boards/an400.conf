# Amlogic A311D2 AN400 开发板配置
# 使用 meson-no-uboot family（跳过 U-Boot，设备已有 bootloader）
BOARD_NAME="AN400"
BOARDFAMILY="meson-no-uboot"
BOARD_MAINTAINER="hejuworld-droid"
BOARD_VENDOR="Amlogic"
BOARD_ARCH="arm64"

# 内核
KERNEL_TARGET="edge"

IMAGE_PARTITION_TABLE="gpt"

# 内存
SKIP_EXTERNAL_TOOLCHAINS="yes"

# 存储
BOOTFS_TYPE="fat"
BOOTSIZE="512"
BOOTFS_LABEL="BOOT"
ROOTFS_TYPE="ext4"
ROOTFS_LABEL="ROOTFS"
INITRD_ARCH="arm64"

# 内核镜像
KERNEL_IMAGE_TYPE="Image"

# 串口
SERIALCON="ttyAML0"

# 硬件
CPUMIN="500000"
CPUMAX="2400000"
GOVERNOR="ondemand"

# 显示
HAVE_HDMI="yes"

# 网络
MODULES=""
MODULES_BLACKLIST=""

# USB
ENABLE_USB_HOST="yes"
ENABLE_USB_STORAGE="yes"
ENABLE_EXTRA="yes"
