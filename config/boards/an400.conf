# Amlogic A311D2 AN400 开发板配置
BOARD_NAME="AN400"
BOARDFAMILY="amlogic-t7"
BOARD_MAINTAINER="hejuworld-droid"
BOARD_VENDOR="Amlogic"
BOARD_ARCH="arm64"

# 内核和引导程序
BOOTCONFIG="khadas-vim4_defconfig"
LINUXFAMILY="amlogic64"
LINUXCONFIG="linux-arm64-edge"
KERNEL_TARGET="edge"

# AN400 主线 DTB（Linux 6.6+ 原生支持）
SRC_EXTLINUX_TARGET="boot/extlinux/extlinux.conf"
SRC_DTB="amlogic-t7-a311d2-an400"

IMAGE_PARTITION_TABLE="gpt"

# 内存配置
RAMDISK_ADDR="0x08008000"
SKIP_EXTERNAL_TOOLCHAINS="yes"

# 存储配置
BOOTFS_TYPE="fat"
BOOTSIZE="512"
BOOTFS_LABEL="BOOT"
ROOTFS_TYPE="ext4"
ROOTFS_LABEL="ROOTFS"
INITRD_ARCH="arm64"

# 内核配置
KERNEL_IMAGE_TYPE="Image"

# U-Boot 配置
BOOTSOURCE="https://github.com/khadas/u-boot"
BOOTBRANCH="branch:khadas-vims-v211"
BOOTDIR="u-boot-khadas-vim4"
BOOTSCRIPT="boot-aml.cmd:boot.scr"
BOOTENV_FILE="amlogic-default.txt"
UBOOT_TARGET="binaries"

# 串口配置
SERIALCON="ttyAML0"

# 硬件特性
CPUMIN="500000"
CPUMAX="2400000"          # A311D2 可达 2.4GHz
GOVERNOR="ondemand"

# 显示
HAVE_HDMI="yes"

# 网络配置
MODULES=""
MODULES_BLACKLIST=""

# USB 和外设支持
ENABLE_USB_HOST="yes"
ENABLE_USB_STORAGE="yes"
ENABLE_EXTRA="yes"
