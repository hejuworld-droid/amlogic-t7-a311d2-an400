# Amlogic A311D2 AN400 开发板配置
# 使用 meson-s4t7 family（Armbian 官方 T7/S4 平台支持，含 U-Boot + ATF）
# 参考 Khadas VIM4 (同芯片 A311D2/T7) 和 CoreLab TVPro T7 的配置
BOARD_NAME="AN400"
BOARD_VENDOR="Amlogic"
BOARDFAMILY="meson-s4t7"
BOARD_MAINTAINER="hejuworld-droid"
INTRODUCED="2026"

KERNEL_TARGET="legacy"
KERNEL_TEST_TARGET="legacy"

IMAGE_PARTITION_TABLE="gpt"

BOOTCONFIG="kvim4_defconfig"
KHADAS_BOARD_ID="kvim4"

SERIALCON="ttyS0"

OVERLAY_PREFIX='t7-a311d2'

SKIP_EXTERNAL_TOOLCHAINS="yes"
