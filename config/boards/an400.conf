BOARD_NAME="AN400"
BOARD_VENDOR="Amlogic"
BOARDFAMILY="meson-s4t7"
BOARD_MAINTAINER="hejuworld-droid"
INTRODUCED="2026"
SERIALCON="ttyS0"

KERNEL_TARGET="legacy"
KERNEL_TEST_TARGET="legacy"

BOOTCONFIG="t7_an408_lpddr4x_defconfig"
KHADAS_BOARD_ID="t7_an408_lpddr4x"

OVERLAY_PREFIX='t7-a311d2'

MODULES_BLACKLIST="iv009_isp iv009_isp_sensor iv009_isp_lens iv009_isp_iq"

function post_family_config__an400() {
	unset ASOUND_STATE
}

function an400_bsp_legacy_postinst_link_video_firmware() {
	ln -sf video_ucode.bin.t7 /lib/firmware/video/video_ucode.bin
}

function post_family_tweaks_bsp__an400() {
	postinst_functions+=(an400_bsp_legacy_postinst_link_video_firmware)
}

function pre_install_kernel_debs__extra_boot_args() {
	display_alert "$BOARD" "Add extra boot arguments" "info"
	run_host_command_logged echo "extraargs=net.ifnames=0 no_console_suspend" >> "${SDCARD}"/boot/armbianEnv.txt
	return 0
}
