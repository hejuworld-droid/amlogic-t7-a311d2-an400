# Amlogic A311D2 AN400 开发板配置
# 使用 meson-g12b family（A311D2/T7 与 G12B 架构兼容）
BOARD_NAME="AN400"
BOARDFAMILY="meson-g12b"
BOARD_MAINTAINER="hejuworld-droid"
BOARD_VENDOR="Amlogic"
BOARD_ARCH="arm64"

# 内核
LINUXCONFIG="linux-arm64-edge"
KERNEL_TARGET="edge"

# AN400 主线 DTB（Linux 6.6+ 原生支持）
SRC_EXTLINUX_TARGET="boot/extlinux/extlinux.conf"
SRC_DTB="amlogic-t7-a311d2-an400"

IMAGE_PARTITION_TABLE="gpt"

# 内存
RAMDISK_ADDR="0x08008000"
SKIP_EXTERNAL_TOOLCHAINS="yes"

# 存储
BOOTFS_TYPE="fat"
BOOTSIZE="512"
BOOTFS_LABEL="BOOT"
ROOTFS_TYPE="ext4"
ROOTFS_LABEL="ROOTFS"
INITRD_ARCH="arm64"

# 内核镜像
KERNEL_IMAGE_TYPE="Image"

# 串口
SERIALCON="ttyAML0"

# 硬件
CPUMIN="500000"
CPUMAX="2400000"
GOVERNOR="ondemand"

# 显示
HAVE_HDMI="yes"

# 网络
MODULES=""
MODULES_BLACKLIST=""

# USB
ENABLE_USB_HOST="yes"
ENABLE_USB_STORAGE="yes"
ENABLE_EXTRA="yes"

# ===== U-Boot: 设备已有 bootloader，完全跳过编译 =====
# 不下载 U-Boot 源码
BOOTCONFIG="none"
BOOTSOURCE=""
BOOTBRANCH=""

function post_family_config__an400_skip_uboot() {
	display_alert "AN400" "U-Boot disabled: device has bootloader in eMMC" "info"

	# 替换 compile_uboot 为空操作
	eval "original_compile_uboot_$(declare -f compile_uboot 2>/dev/null || echo _noop_)"
	function compile_uboot() {
		display_alert "AN400" "U-Boot compilation skipped" "info"
		return 0
	}
}
