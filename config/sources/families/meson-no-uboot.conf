#
# Custom family for AN400: meson64 kernel without U-Boot compilation
# Device has bootloader pre-installed in eMMC
#

UBOOT_TARGET_MAP=""
BOOTSCRIPT="boot-meson64.cmd:boot.cmd"
BOOTENV_FILE='meson.txt'
LINUXFAMILY=meson64
ARCH=arm64
SERIALCON=ttyAML0
SRC_LOADADDR='LOADADDR=0x1080000'
BOOTBRANCH=""
BOOTPATCHDIR=""
OVERLAY_PREFIX='meson'
OVERLAY_DIR="/boot/dtb/amlogic/overlay"

# This is an extension method, put directly in meson64_common. A "built-in" extension if you will.
# Bring in LibreELEC's amlogic-boot-fip repo, which is the authoritative source for FIP blobs.
# To add FIP blobs for a new board, send a PR there, they're awesome.
function fetch_sources_tools__libreelec_amlogic_fip() {
	fetch_from_repo "https://github.com/LibreELEC/amlogic-boot-fip" "amlogic-boot-fip" "branch:master"
}

# this family does not need it
ATF_COMPILE="no"

# Set CPUMIN et al if not already set in the board config.
CPUMIN=${CPUMIN:-500000}
CPUMAX=${CPUMAX:-2400000}
GOVERNOR=${GOVERNOR:-ondemand}

case $BRANCH in
	oldlts)
		declare -g KERNEL_MAJOR_MINOR="6.12"
		;;
	current)
		declare -g KERNEL_MAJOR_MINOR="6.18"
		;;
	edge)
		declare -g KERNEL_MAJOR_MINOR="7.0"
		;;
	bleedingedge)
		declare -g KERNEL_MAJOR_MINOR="7.1"
		;;
esac

# Use custom vendor driver for wireless rtl88x2cs
# See https://github.com/armbian/build/pull/6227
function custom_kernel_config__enable_rtl88x2cs_driver() {
	opts_m+=("CONFIG_RTL8822CS")
}

# ===== Skip U-Boot compilation =====
BOOTSOURCE=''
BOOTBRANCH=''
BOOTCONFIG=''
BOOTSCRIPT=''
BOOTENV_FILE=''
BOOTPATCHDIR=''
UBOOT_TARGET_MAP=''

function compile_uboot() {
	display_alert "AN400" "U-Boot compilation skipped (pre-installed on device)" "info"
	return 0
}

function compile_uboot_target() {
	display_alert "AN400" "U-Boot configuration skipped (pre-installed on device)" "info"
	return 0
}

function uboot_custom_postprocess() {
	display_alert "AN400" "U-Boot FIP processing skipped (pre-installed on device)" "info"
	return 0
}
