#
# Custom family for AN400: meson64 kernel without U-Boot compilation
# Device has bootloader pre-installed in eMMC
#

ARCH="arm64"
LINUXFAMILY="meson64"
SERIALCON="ttyAML0"
OVERLAY_PREFIX="meson"
OVERLAY_DIR="/boot/dtb/amlogic/overlay"

# No U-Boot - device has bootloader in eMMC
BOOTCONFIG="none"

# Set dummy values for validation, but BOOTCONFIG=none disables actual U-Boot build
BOOTDIR="none"
BOOTBRANCH="tag:none"
BOOTSOURCE="none"
BOOTPATCHDIR="none"
UBOOT_TARGET_MAP=""

KERNEL_TARGET="edge"
case "${BRANCH}" in
    edge)
        declare -g KERNEL_MAJOR_MINOR="7.0"
        ;;
esac
LINUXCONFIG="linux-arm64-edge"
ATF_COMPILE="no"
CPUMIN="${CPUMIN:-500000}"
CPUMAX="${CPUMAX:-2400000}"
GOVERNOR="${GOVERNOR:-ondemand}"
