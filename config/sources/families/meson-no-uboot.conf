#
# Custom family for AN400: meson64 kernel without U-Boot compilation
# Device has bootloader pre-installed in eMMC
# Based on bcm2711 family approach
#

declare -g ARCH="arm64"
declare -g LINUXFAMILY="meson64"
declare -g SERIALCON="ttyAML0"
declare -g OVERLAY_PREFIX="meson"
declare -g OVERLAY_DIR="/boot/dtb/amlogic/overlay"

# Skip U-Boot compilation - use 'none' like bcm2711
declare -g BOOTCONFIG=none

# Kernel version
declare -g KERNEL_TARGET="edge"

case "${BRANCH}" in
    edge)
        declare -g KERNEL_MAJOR_MINOR="7.0"
        ;;
esac

# Use mainline defconfig for meson64
declare -g LINUXCONFIG="linux-arm64-edge"

# Boot and storage configuration
declare -g BOOT_LAYOUT="extlinux"
declare -g STORAGE="emmc"

# ATF not needed
declare -g ATF_COMPILE="no"

# CPU frequency scaling
declare -g CPUMIN="${CPUMIN:-500000}"
declare -g CPUMAX="${CPUMAX:-2400000}"
declare -g GOVERNOR="${GOVERNOR:-ondemand}"

# Hook to skip U-Boot build - unset BOOTSOURCE like bcm2711 does
function post_family_config__skip_uboot() {
    display_alert "Skipping U-Boot for AN400" "device has bootloader in eMMC" "info"
    unset BOOTSOURCE
    unset BOOTBRANCH
    unset BOOTDIR
    declare -g BOOTPATCHDIR=""
}
