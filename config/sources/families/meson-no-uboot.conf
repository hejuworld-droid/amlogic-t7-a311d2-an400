#
# Custom family for AN400: meson64 kernel without U-Boot
# Device has bootloader pre-installed in eMMC
# DO NOT inherit meson64_common.inc to avoid U-Boot build
#

ARCH="arm64"
LINUXFAMILY="meson64"
SERIALCON="ttyAML0"
OVERLAY_PREFIX="meson"
OVERLAY_DIR="/boot/dtb/amlogic/overlay"

# No U-Boot - device has bootloader in eMMC
# Set all U-Boot variables to disable U-Boot artifact build
# BOOTCONFIG=none is the key - it tells Armbian to skip U-Boot
BOOTCONFIG="none"
BOOTDIR=""
BOOTBRANCH=""
BOOTSOURCE=""
BOOTPATCHDIR=""

# Kernel version
KERNEL_TARGET="edge"

case "${BRANCH}" in
	edge)
		declare -g KERNEL_MAJOR_MINOR="7.0"
		;;
esac

# Use mainline defconfig for meson64
LINUXCONFIG="linux-arm64-edge"

# ATF not needed
ATF_COMPILE="no"

# CPU frequency scaling
CPUMIN=${CPUMIN:-500000}
CPUMAX=${CPUMAX:-2400000}
GOVERNOR=${GOVERNOR:-ondemand}
