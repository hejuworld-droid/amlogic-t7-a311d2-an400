#
# Custom family for AN400: meson64 kernel without U-Boot compilation
# Device has bootloader pre-installed in eMMC
# Uses BOOTCONFIG=none like bcm2711 to skip U-Boot artifact entirely
#

LINUXFAMILY=meson64
ARCH=arm64
SERIALCON=ttyAML0
SRC_LOADADDR='LOADADDR=0x1080000'

BOOTCONFIG=none

BOOTSOURCE=''
BOOTBRANCH=''
BOOTPATCHDIR=''
UBOOT_TARGET_MAP=''

ATF_COMPILE="no"

BOOTSCRIPT="boot-meson64.cmd:boot.cmd"
BOOTENV_FILE='meson.txt'

OVERLAY_PREFIX='meson'
OVERLAY_DIR="/boot/dtb/amlogic/overlay"

CPUMIN=${CPUMIN:-500000}
CPUMAX=${CPUMAX:-1536000}
GOVERNOR=${GOVERNOR:-ondemand}

case $BRANCH in
	oldlts)
		declare -g KERNEL_MAJOR_MINOR="6.12"
		;;
	current)
		declare -g KERNEL_MAJOR_MINOR="6.18"
		;;
	edge)
		declare -g KERNEL_MAJOR_MINOR="7.0"
		;;
	bleedingedge)
		declare -g KERNEL_MAJOR_MINOR="7.1"
		;;
esac

function fetch_sources_tools__libreelec_amlogic_fip() {
	fetch_from_repo "https://github.com/LibreELEC/amlogic-boot-fip" "amlogic-boot-fip" "branch:master"
}

function custom_kernel_config__enable_rtl88x2cs_driver() {
	opts_m+=("CONFIG_RTL8822CS")
}

function write_uboot_platform() {
	display_alert "AN400" "U-Boot write skipped (pre-installed on device)" "info"
}
