#
# Custom family for AN400: meson64 kernel without U-Boot compilation
# Device has bootloader pre-installed in eMMC
#

# shellcheck source=config/sources/families/include/meson64_common.inc
source "${BASH_SOURCE%/*}/include/meson64_common.inc"

# U-Boot 不需要 - 设备已有 bootloader
BOOTSOURCE=''
BOOTBRANCH=''
BOOTCONFIG=''
BOOTSCRIPT=''
BOOTENV_FILE=''
BOOTPATCHDIR=''
UBOOT_TARGET_MAP=''

function compile_uboot() {
	display_alert "AN400" "U-Boot compilation skipped (pre-installed on device)" "info"
	return 0
}

function compile_uboot_target() {
	display_alert "AN400" "U-Boot configuration skipped (pre-installed on device)" "info"
	return 0
}

function uboot_custom_postprocess() {
	display_alert "AN400" "U-Boot FIP processing skipped (pre-installed on device)" "info"
	return 0
}