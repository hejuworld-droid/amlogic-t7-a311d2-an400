#
# Custom family for AN400: meson64 kernel without U-Boot compilation
# Device has bootloader pre-installed in eMMC
#

ARCH="arm64"
LINUXFAMILY="meson64"
SERIALCON="ttyAML0"
OVERLAY_PREFIX="meson"
OVERLAY_DIR="/boot/dtb/amlogic/overlay"

# Skip U-Boot - device has bootloader in eMMC
BOOTCONFIG="none"

# Kernel version
KERNEL_TARGET="edge"

case "${BRANCH}" in
    edge)
        declare -g KERNEL_MAJOR_MINOR="7.0"
        ;;
esac

# Use mainline defconfig for meson64
LINUXCONFIG="linux-arm64-edge"

# Boot and storage configuration
BOOT_LAYOUT="extlinux"
STORAGE="emmc"

# ATF not needed
ATF_COMPILE="no"

# CPU frequency scaling
CPUMIN="${CPUMIN:-500000}"
CPUMAX="${CPUMAX:-2400000}"
GOVERNOR="${GOVERNOR:-ondemand}"

# Hook to completely skip U-Boot build
function post_family_config__skip_uboot() {
    display_alert "Skipping U-Boot for AN400" "device has bootloader in eMMC" "info"
    unset BOOTSOURCE
    unset BOOTDIR
    unset BOOTBRANCH
    unset BOOTPATCHDIR
}
