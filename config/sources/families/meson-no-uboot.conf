#
# Custom family for AN400: meson64 kernel without U-Boot compilation
# Device has bootloader pre-installed in eMMC
#

ARCH="arm64"
LINUXFAMILY="meson64"
SERIALCON="ttyAML0"
OVERLAY_PREFIX="meson"
OVERLAY_DIR="/boot/dtb/amlogic/overlay"

# Use a valid U-Boot defconfig for Amlogic G12B (similar to AN400's A311D2)
# This passes validation but we'll skip actual compilation
BOOTCONFIG="khadas-vim3_defconfig"
BOOTENV_FILE="meson64.txt"
BOOTDIR="u-boot"
BOOTBRANCH="tag:v2024.04"
BOOTSOURCE="https://github.com/u-boot/u-boot"
BOOTPATCHDIR="u-boot"

# Empty target map means no actual build output
UBOOT_TARGET_MAP=""

# Kernel version
KERNEL_TARGET="edge"

case "${BRANCH}" in
    edge)
        declare -g KERNEL_MAJOR_MINOR="7.0"
        ;;
esac

# Use mainline defconfig for meson64
LINUXCONFIG="linux-arm64-edge"

# Boot and storage configuration
BOOT_LAYOUT="extlinux"
STORAGE="emmc"

# ATF not needed
ATF_COMPILE="no"

# CPU frequency scaling
CPUMIN="${CPUMIN:-500000}"
CPUMAX="${CPUMAX:-2400000}"
GOVERNOR="${GOVERNOR:-ondemand}"

# Hook to skip U-Boot build completely
function post_family_config__skip_uboot() {
    display_alert "Skipping U-Boot for AN400" "device has bootloader in eMMC" "info"
    # Clear U-Boot source to skip fetching and building
    unset BOOTSOURCE
    unset BOOTDIR
    unset BOOTBRANCH
    unset BOOTPATCHDIR
    # Set empty target map
    declare -g UBOOT_TARGET_MAP=""
}
